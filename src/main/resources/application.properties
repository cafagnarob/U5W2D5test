spring.application.name=U5W2D5test
spring.config.import=optional:file:env.properties
server.port=${PORT}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
cloudinary.apikey=${CLOUDINARY_APIKEY}
cloudinary.secret=${CLOUDINARY_SECRET}
cloudinary.name=${CLOUDINARY_NAME}
CLOUDINARY_URL=cloudinary://${CLOUDINARY_APIKEY}:${CLOUDINARY_SECRET}@${CLOUDINARY_NAME}
#JWT
jwt.secret=${JWT_SECRET}